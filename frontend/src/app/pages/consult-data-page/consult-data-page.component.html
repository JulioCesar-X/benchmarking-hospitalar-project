

<div id="contentToConvert"> <!-- div adicionada para especificar o que vai ser exportado para PDF -->
    <div class="container">
        <app-navbar></app-navbar>
    
        <main>
    
            <app-consult-data-filter (filterData)="handleFilterData($event)"></app-consult-data-filter>
            <h2 class="pageTitle">Dados por mês:</h2>
            <button (click)="exportToPDF()">Export to PDF</button>
    
            <div class="graphicsContainer">
                <div class="row">
                    <div>
                        <app-data-graphic [data]="homologData" typeOfGraph="month" [homologueYear]="homologueYear"></app-data-graphic>
                    </div>
                    <div>
                        <app-data-graphic [data]="data" typeOfGraph="month" [homologueYear]="year"></app-data-graphic>
                    </div>
                </div>
                <div class="row">
                    <div>
                        <app-data-graphic [data]="yearlyData" [homologueYear]="year" typeOfGraph="year"></app-data-graphic>
                    </div>
                </div>
    
                
            </div>
        </main>
        
        <app-footer></app-footer>
    </div>  
</div>
